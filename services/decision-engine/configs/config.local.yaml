database:
  host: localhost
  port: 5442
  user: postgres
  password: postgres
  name: chat-bot
  sslmode: disable
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 1h
  conn_max_idle_time: 15m
  health_check_period: 1m

logger:
  level: debug
  format: console
  output: stdout
  enable_colors: true
  file_path: ./logs/chat-bot.log
  max_size: 50
  max_backups: 2
  max_age: 7
  compress: false

lemmatizer:
  base_url: http://localhost:8000
  timeout: 5s
  cb_max_requests: 3
  cb_interval: 1m
  cb_max_failures: 5
  cb_timeout: 30s

nlp:
  base_url: http://localhost:8081
  timeout: 5s
  expected_dimension: 384

http:
  address: ":8080"
  read_timeout: 10s
  read_head_timeout: 5s
  write_timeout: 10s
  idle_timeout: 60s
  max_header_bytes: 1048576  # 1 MB
  timeout: 15s
  body_limit: 10485760  # 10 MB
  enable_logs: true
  enable_recovery: true
